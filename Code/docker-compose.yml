version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: hiresight_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: interview_user
      MONGO_INITDB_ROOT_PASSWORD: interview_pass
      MONGO_INITDB_DATABASE: interview_platform
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hiresight-network

  # Backend API (FastAPI)
  backend:
    build: ./backend
    container_name: hiresight_backend
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URL=mongodb://interview_user:interview_pass@mongodb:27017/interview_platform?authSource=admin
      - SECRET_KEY=your-secret-key-change-in-production-use-openssl-rand-hex-32
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - UPLOAD_DIR=/app/uploads
      - MAX_FILE_SIZE=10485760
      - NER_MODEL=yashpwr/resume-ner-bert-v2
      - CORS_ORIGINS=http://localhost:3000,http://frontend:3000
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/app:/app/app
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - hiresight-network

  # Frontend (Next.js)
  frontend:
    build: ./frontend
    container_name: hiresight_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - hiresight-network

networks:
  hiresight-network:
    driver: bridge

volumes:
  mongodb_data:
  mongodb_config:
