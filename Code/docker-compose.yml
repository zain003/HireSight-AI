version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:14-alpine
    container_name: hiresight_db
    environment:
      POSTGRES_DB: interview_platform
      POSTGRES_USER: interview_user
      POSTGRES_PASSWORD: interview_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U interview_user -d interview_platform"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hiresight-network

  # Backend API (FastAPI)
  backend:
    build: ./backend
    container_name: hiresight_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://interview_user:interview_pass@db:5432/interview_platform
      - SECRET_KEY=your-secret-key-change-in-production-use-openssl-rand-hex-32
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - UPLOAD_DIR=/app/uploads
      - MAX_FILE_SIZE=10485760
      - SBERT_MODEL=all-MiniLM-L6-v2
      - CORS_ORIGINS=http://localhost:3000,http://frontend:3000
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/app:/app/app
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - hiresight-network

  # Frontend (Next.js)
  frontend:
    build: ./frontend
    container_name: hiresight_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - hiresight-network

networks:
  hiresight-network:
    driver: bridge

volumes:
  postgres_data:
